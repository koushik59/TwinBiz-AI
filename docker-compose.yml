services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: twinbiz
      POSTGRES_PASSWORD: twinbiz
      POSTGRES_DB: twinbiz
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U twinbiz"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://twinbiz:twinbiz@db:5432/twinbiz
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
